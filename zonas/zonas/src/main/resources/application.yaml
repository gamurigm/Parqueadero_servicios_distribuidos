server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://usuarios-database:5432/UsuariosDB
    username: admin_user
    password: xasmdno123XAW2342as
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    web:
      pageable:
        max-page-size: 50
        default-page-size: 10
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
    routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}

springdoc:
  api-docs:
    path: /v3/api-docs  # Cambiado a /v3/api-docs para compatibilidad
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
  packages-to-scan:
    - ec.edu.espe.zonas.controladores
    - ec.edu.espe.zonas.DTOs
    - ec.edu.espe.zonas.entidades
  paths-to-match: /api/v1/**
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: true
  use-fqn: true
  remove-broken-reference-definitions: true
  model-and-view-allowed: false

  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

# Configuracion de CORS
web:
  cors:
    allowed-origins:
      - http://localhost:8085
      - http://127.0.0.1:8085
      - http://localhost:8000
      - http://127.0.0.1:8000
      - http://host.docker.internal:8000
      - http://localhost:5000
      - http://127.0.0.1:5000
      - http://host.docker.internal:5000
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://host.docker.internal:3000
      - http://localhost:3001
      - http://127.0.0.1:3001
      - http://host.docker.internal:3001
      - http://localhost:3002
      - http://127.0.0.1:3002
      - http://host.docker.internal:3002
      - http://localhost:3003
      - http://127.0.0.1:3003
      - http://host.docker.internal:3003
      - http://localhost:8080
      - http://127.0.0.1:8080
      - http://host.docker.internal:8080
      - http://localhost:8081
      - http://127.0.0.1:8081
      - http://host.docker.internal:8081
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600