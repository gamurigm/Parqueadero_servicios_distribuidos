spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://localhost:5435/zonas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    web:
      pageable:
        max-page-size: 50
        default-page-size: 10
