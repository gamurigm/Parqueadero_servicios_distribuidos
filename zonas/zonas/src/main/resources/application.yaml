server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://localhost:5435/zonas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    web:
      pageable:
        max-page-size: 50
        default-page-size: 10

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
  packages-to-scan:
    - ec.edu.espe.zonas.controladores
    - ec.edu.espe.zonas.DTOs
    - ec.edu.espe.zonas.entidades
  paths-to-match: /api/v1/**
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: true
  use-fqn: true
  remove-broken-reference-definitions: true
  model-and-view-allowed: false

  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false