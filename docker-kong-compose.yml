networks:
  kong-net:
    driver: bridge

services:
  # Base de datos Usuarios
  usuarios-database:
    image: postgres:16-alpine
    container_name: usuarios-database
    environment:
      POSTGRES_DB: UsuariosDB
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: xasmdno123XAW2342as
    ports:
      - "5436:5432"
    networks:
      - kong-net
    volumes:
      - usuarios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  # Base de datos de Kong
  kong-database:
    image: postgres:16-alpine
    container_name: kong-database
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongpass
    ports:
      - "5432:5432"
    networks:
      - kong-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migraciones de Kong
  kong-migrations:
    image: kong:latest
    container_name: kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - kong-net
    restart: on-failure

  # Servicio Vehiculos (NestJS - Puerto 3000)
  vehiculos:
    image: vehiculos:latest 
    container_name: vehiculos
    build:
      context: ./vehiculos
      dockerfile: vehiculos.dockerfile  
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=usuarios-database
      - DB_PORT=5432
      - DB_USUARIO=admin_user
      - DB_CONTRASENA=xasmdno123XAW2342as
      - DB_NOMBRE=UsuariosDB
    ports:
      - "3000:3000"  
    networks:
      - kong-net
    depends_on:
      usuarios-database:
        condition: service_healthy
    restart: unless-stopped

  # Servicio Usuarios (NestJS - Puerto 5000)
  usuarios:
    image: usuarios:latest
    container_name: usuarios
    build:
      context: ./gestion_usuarios
      dockerfile: usuarios.dockerfile  
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=usuarios-database
      - DB_PORT=5432
      - DB_USER=admin_user
      - DB_PASSWORD=xasmdno123XAW2342as
      - DB_NAME=UsuariosDB
    ports:
      - "5000:5000"
    networks:
      - kong-net
    depends_on:
      usuarios-database:
        condition: service_healthy
    restart: unless-stopped

  # Servicio Zonas (Spring Boot - Puerto 8080)
  zonas:
    image: zonas:latest
    container_name: zonas
    build:
      context: ./zonas/zonas
      dockerfile: zonas.dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://usuarios-database:5432/UsuariosDB
      - SPRING_DATASOURCE_USERNAME=admin_user
      - SPRING_DATASOURCE_PASSWORD=xasmdno123XAW2342as
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
    ports:
      - "8080:8080"
    networks:
      - kong-net
    depends_on:
      usuarios-database:
        condition: service_healthy
    restart: unless-stopped
  #Unificacion de swaggers
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: swagger-ui
    environment:
      SERVICES: '[
        {"name": "NestJS-1", "url": "http://vehiculos:3000/docs-json"},
        {"name": "NestJS-2", "url": "http://usuarios:5000/docs-json"},
        {"name": "Spring-Boot", "url": "http://zonas:8080/v3/api-docs"}]'
    ports:
      - "8085:8080"
    networks:
      - kong-net
    depends_on:
      - usuarios
      - vehiculos
      - zonas
  # KONG GATEWAY
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
      - "9001:8001"
      - "8443:8443"
      - "8444:8444"
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  usuarios_postgres_data:
  postgres_data: