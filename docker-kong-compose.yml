networks:
  kong-net:
    driver: bridge

services:
  # Open Policy Agent
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=debug"
      - "/policies"
    volumes:
      - ./opa/policies:/policies
    networks:
      - kong-net
    restart: unless-stopped

  # Base de datos Usuarios
  usuarios-database:
    image: postgres:16-alpine
    container_name: usuarios-database
    environment:
      POSTGRES_DB: UsuariosDB
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: xasmdno123XAW2342as
    ports:
      - "5436:5432"
    networks:
      - kong-net
    volumes:
      - usuarios_postgres_data:/var/lib/postgresql/data
      - ./gestion_usuarios/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de datos Vehiculos
  vehiculos-database:
    image: postgres:16-alpine
    container_name: vehiculos-database
    environment:
      POSTGRES_DB: VehiculoDB
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: xasmdnoasd65168zcs
    ports:
      - "5437:5432"
    networks:
      - kong-net
    volumes:
      - vehiculos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de datos Zonas
  zonas-database:
    image: postgres:16-alpine
    container_name: zonas-database
    environment:
      POSTGRES_DB: ZonasDB
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: xas52sf6zxc123XAW25asdzxkmas
    ports:
      - "5438:5432"
    networks:
      - kong-net
    volumes:
      - zonas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  # Base de datos de Kong
  kong-database:
    image: postgres:16-alpine
    container_name: kong-database
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongpass
    ports:
      - "5432:5432"
    networks:
      - kong-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migraciones de Kong
  kong-migrations:
    image: kong:latest
    container_name: kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - kong-net
    restart: on-failure

  # Base de datos Trazabilidad
  trazabilidad-database:
    image: postgres:16-alpine
    container_name: trazabilidad-database
    environment:
      POSTGRES_DB: TrazabilidadDB
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: xasmdno123XAW2342as
    ports:
      - "5440:5432"
    networks:
      - kong-net
    volumes:
      - trazabilidad_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servicio Vehiculos (NestJS - Puerto 3000)
  vehiculos:
    image: vehiculos:latest 
    container_name: vehiculos
    build:
      context: ./vehiculos
      dockerfile: vehiculos.dockerfile  
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=vehiculos-database
      - DB_PORT=5432
      - DB_USUARIO=admin_user
      - DB_CONTRASENA=xasmdnoasd65168zcs
      - DB_NOMBRE=VehiculoDB
    ports:
      - "3001:3000"  
    networks:
      - kong-net
    depends_on:
      vehiculos-database:
        condition: service_healthy
    restart: unless-stopped

  # Servicio Usuarios (NestJS - Puerto 5000)
  usuarios:
    image: usuarios:latest
    container_name: usuarios
    build:
      context: ./gestion_usuarios
      dockerfile: usuarios.dockerfile  
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=usuarios-database
      - DB_PORT=5432
      - DB_USER=admin_user
      - DB_PASSWORD=xasmdno123XAW2342as
      - DB_NAME=UsuariosDB
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - JWT_AUDIENCE=parqueadero-api
      - OPA_URL=http://opa:8181/v1/data
    ports:
      - "5000:5000"
    networks:
      - kong-net
    depends_on:
      usuarios-database:
        condition: service_healthy
    restart: unless-stopped

  # Servicio Zonas (Spring Boot - Puerto 8080)
  zonas:
    image: zonas:latest
    container_name: zonas
    build:
      context: ./zonas/zonas
      dockerfile: zonas.dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://zonas-database:5432/ZonasDB
      - SPRING_DATASOURCE_USERNAME=admin_user
      - SPRING_DATASOURCE_PASSWORD=xas52sf6zxc123XAW25asdzxkmas
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - JWT_ISSUER=gestion-usuarios
    ports:
      - "8080:8080"
    networks:
      - kong-net
    depends_on:
      zonas-database:  
        condition: service_healthy
    restart: unless-stopped

  # Servicio Trazabilidad (NestJS - Puerto 3002)
  trazabilidad:
    image: trazabilidad:latest
    container_name: trazabilidad
    build:
      context: ./trazabilidad
      dockerfile: trazabilidad.dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=trazabilidad-database
      - DB_PORT=5432
      - DB_USUARIO=admin_user
      - DB_CONTRASENA=xasmdno123XAW2342as
      - DB_NOMBRE=TrazabilidadDB
      - VEHICULOS_SERVICE_URL=http://vehiculos:3000
      - USUARIOS_SERVICE_URL=http://usuarios:5000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - JWT_ISSUER=gestion-usuarios
    ports:
      - "3002:3002"
    networks:
      - kong-net
    depends_on:
      trazabilidad-database:
        condition: service_healthy
      vehiculos:
        condition: service_started
    restart: unless-stopped

  #Unificacion de swaggers
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: swagger-ui
    environment:
      - URLS_PRIMARY_NAME=Usuarios
      - URLS=[{"name":"Vehículos","url":"http://localhost:3000/api-json"},{"name":"Usuarios","url":"http://localhost:5000/docs-json"},{"name":"Zonas","url":"http://localhost:8080/v3/api-docs"},{"name":"Trazabilidad","url":"http://localhost:3002/docs-json"}]
    ports:
      - "8085:8080"
    networks:
      - kong-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # KONG GATEWAY
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
      - "9001:8001"
      - "8443:8443"
      - "8444:8444"
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Inicialización de Kong 
  kong-init:
    image: alpine:latest
    container_name: kong-init
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - kong-net
    command: |
      sh -c '
        echo "Instalando curl..."
        apk add --no-cache curl
        
        echo "Esperando a que Kong esté listo..."
        sleep 15
        
        echo "Configurando servicios..."
        
        # Servicio de Usuarios
        curl -s -X POST http://kong:8001/services \
          --data name=usuarios-service \
          --data url=http://usuarios:5000
        
        # Servicio de Vehículos
        curl -s -X POST http://kong:8001/services \
          --data name=vehiculos-service \
          --data url=http://vehiculos:3000
        
        # Servicio de Zonas
        curl -s -X POST http://kong:8001/services \
          --data name=zonas-service \
          --data url=http://zonas:8080
        
        # Servicio de Trazabilidad
        curl -s -X POST http://kong:8001/services \
          --data name=trazabilidad-service \
          --data url=http://trazabilidad:3002
        
        
        #  IMPORTANTE: strip_path=true para que Kong quite el prefijo /usuarios
        # Ruta para Usuarios - con strip_path=true
        curl -s -X POST http://kong:8001/services/usuarios-service/routes \
          --data "paths[]=/usuarios" \
          --data name=usuarios-route \
          --data strip_path=true \
          --data preserve_host=false
      
        
        # Rutas para Vehículos
        curl -s -X POST http://kong:8001/services/vehiculos-service/routes \
          --data "paths[]=/vehiculos" \
          --data name=vehiculos-route \
          --data strip_path=true \
          --data preserve_host=false
        
        # Rutas para Zonas
        curl -s -X POST http://kong:8001/services/zonas-service/routes \
          --data "paths[]=/zonas" \
          --data name=zonas-route \
          --data strip_path=true \
          --data preserve_host=false
        
        # Rutas para Trazabilidad
        curl -s -X POST http://kong:8001/services/trazabilidad-service/routes \
          --data "paths[]=/trazabilidad" \
          --data name=trazabilidad-route \
          --data strip_path=true \
          --data preserve_host=false
        
        echo "Configurando plugins..."
        
        # CORS
        curl -s -X POST http://kong:8001/plugins \
          --data name=cors \
          --data "config.origins=*" \
          --data "config.methods=GET, POST, PUT, DELETE, PATCH, OPTIONS" \
          --data "config.headers=Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Auth-Token, Authorization" \
          --data "config.exposed_headers=X-Auth-Token" \
          --data "config.credentials=true" \
          --data "config.max_age=3600"
        
      
      '
    restart: "no"
  #konga para usar kong
  konga:
    image: pantsel/konga:latest
    container_name: konga
    environment:
      - NODE_ENV=production
      - TOKEN_SECRET=asdnisaasc1654asd167as4da2s1684asd1fzx7sdw9qrgbnhju9
    ports:
      - "1337:1337"
    networks:
      - kong-net
    restart: unless-stopped

volumes:
  usuarios_postgres_data:
  vehiculos_postgres_data:   
  zonas_postgres_data:       
  postgres_data:
  trazabilidad_postgres_data: