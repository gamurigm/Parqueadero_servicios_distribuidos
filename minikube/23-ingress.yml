apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parqueadero-ingress
  namespace: app-parqueadero
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, Content-Length, Date"
spec:
  ingressClassName: nginx
  rules:
    - host: parqueadero.local
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # Usuarios (Kong)
          - path: /usuarios(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Vehiculos (Kong)
          - path: /vehiculos(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Tickets (Kong)
          - path: /tickets(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Trazabilidad (Kong)
          - path: /trazabilidad(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Zonas (Kong)
          - path: /zonas(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Audit (Kong)
          - path: /audit(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

          # Swagger UI
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: swagger-ui
                port:
                  number: 8080

          # Konga
          - path: /konga
            pathType: Prefix
            backend:
              service:
                name: konga
                port:
                  number: 1337
