apiVersion: apps/v1
kind: Deployment
metadata:
  name: trazabilidad
  namespace: app-parqueadero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trazabilidad
  template:
    metadata:
      labels:
        app: trazabilidad
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z trazabilidad-db 5432; do echo 'Esperando trazabilidad-db...'; sleep 2; done"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z rabbitmq 5672; do echo 'Esperando rabbitmq...'; sleep 2; done"
        - name: wait-for-init-keys
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until [ -f /keys/private.pem ]; do echo 'Esperando init-keys...'; sleep 2; done"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
      containers:
        - name: trazabilidad
          image: trazabilidad:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: DB_HOST
              value: "trazabilidad-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USUARIO
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: trazabilidad-user
            - name: DB_CONTRASENA
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: trazabilidad-password
            - name: DB_NOMBRE
              value: "TrazabilidadDB"
            - name: VEHICULOS_SERVICE_URL
              value: "http://kong-proxy:8000/vehiculos"
            - name: USUARIOS_SERVICE_URL
              value: "http://kong-proxy:8000/usuarios"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: JWT_ISSUER
              value: "gestion-usuarios"
            - name: OPA_URL
              value: "http://opa:8181/v1/data"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_EXCHANGE
              value: "audit_exchange"
            - name: RABBITMQ_ROUTING_KEY
              value: "audit.event"
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
      volumes:
        - name: jwt-keys
          persistentVolumeClaim:
            claimName: jwt-keys-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: trazabilidad
  namespace: app-parqueadero
spec:
  selector:
    app: trazabilidad
  ports:
    - port: 3002
      targetPort: 3002
