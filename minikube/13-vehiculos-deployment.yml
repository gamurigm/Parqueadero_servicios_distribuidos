apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehiculos
  namespace: app-parqueadero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehiculos
  template:
    metadata:
      labels:
        app: vehiculos
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z vehiculos-db 5432; do echo 'Esperando vehiculos-db...'; sleep 2; done"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z rabbitmq 5672; do echo 'Esperando rabbitmq...'; sleep 2; done"
        - name: wait-for-init-keys
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until [ -f /keys/private.pem ]; do echo 'Esperando init-keys...'; sleep 2; done"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
      containers:
        - name: vehiculos
          image: vehiculos:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "vehiculos-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USUARIO
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: vehiculos-user
            - name: DB_CONTRASENA
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: vehiculos-password
            - name: DB_NOMBRE
              value: "VehiculoDB"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: JWT_ISSUER
              value: "gestion-usuarios"
            - name: OPA_URL
              value: "http://opa:8181/v1/data"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_EXCHANGE
              value: "audit_exchange"
            - name: RABBITMQ_ROUTING_KEY
              value: "audit.event"
            - name: TICKETS_SERVICE_URL
              value: "http://tickets:3003"
            - name: TRAZABILIDAD_SERVICE_URL
              value: "http://trazabilidad:3002"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
      volumes:
        - name: jwt-keys
          persistentVolumeClaim:
            claimName: jwt-keys-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vehiculos
  namespace: app-parqueadero
spec:
  selector:
    app: vehiculos
  ports:
    - port: 3000
      targetPort: 3000
